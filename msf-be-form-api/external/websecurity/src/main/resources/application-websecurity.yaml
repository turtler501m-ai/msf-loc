## Common Profile

#### Server - Servlet Container
server:
  port: 8080
  tomcat:
    connection-timeout: 2800
    keep-alive-timeout: -1
    max-keep-alive-requests: -1
    threads:
      max: 200
      min-spare: 200
  accept-count: 100
  shutdown: graceful
  forward-headers-strategy: framework



#### Spring
spring:

  #### Security
  security:
    jwt:
      secret-key: ${SECURITY_JWT_SECRET_KEY}
      issuer: kt-Mmobile-SmartForm

  #### Binding
  binding:
    string-trim: true
    string-empty-as-null: false



#### Logging
logging:
  pattern:
    correlation: "[%X{traceId}-%X{spanId}][%X{memberId}] "



#### Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  tracing:
    sampling:
      probability: 1.0
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.9, 0.95, 0.99



---
## LOCAL Profile
spring:
  config.activate.on-profile: local

## Response Handling
response-handling:
  exception:
    className: true
    message: true

#### Actuator
management:
  server:
    port: ${server.port}



