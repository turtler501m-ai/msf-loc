server.port=8081
spring.application.name=msf-api

# ----- M전산 조회 (방안 A: M포탈과 동일) -----
# 로컬: PostgreSQL. 테이블 생성은 ktm/doc/tabdoc/kcf_tab_create1.sql 실행
# 비밀번호: 로컬 postgres 사용자 비밀번호로 변경. 또는 -DDB_PASSWORD=비밀번호 / 환경변수 DB_PASSWORD 사용
spring.datasource.url=jdbc:postgresql://localhost:5432/msf
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# 운영 M전산(Oracle) 사용 시 위를 주석하고 아래로 교체
# spring.datasource.url=jdbc:oracle:thin:@host:port:sid
# spring.datasource.username=  spring.datasource.password=
# spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
# M전산 조회 실패 시 Mock 인증 허용 (로컬 개발용, 기본 false)
msf.join-info.mock-when-no-db=true

# ----- M플랫폼 연동 (기존 MCP 와 동일 설정키·구조) -----
# juice.url: MCP MplatFormServerAdapter 와 동일. msc-prx URL (미설정 시 X20 Mock)
# SERVER_NAME=LOCAL 이면 getVo(20) Mock, 아니면 adapter.callService(juice.url)
# juice.url=http://host:7006/mPlatform/serviceCall.do
SERVER_NAME=LOCAL

# ----- OSST 서버 연동 (데이터쉐어링 신규개통 전용) -----
# osst.url: ASIS MplatFormOsstServerAdapter 와 동일 URL.
# 미설정(LOCAL) 시 Mock 응답 반환.
# osst.url=http://osst-server-host:port/osst/serviceCall.do

# ----- 로그 레벨 -----
# msf 서비스 레이어 DEBUG 로그 출력 (로컬 개발용)
logging.level.com.ktmmobile.msf=DEBUG
# 운영 배포 시 아래로 교체
# logging.level.com.ktmmobile.msf=INFO

# ----- NICE 계좌인증 연동 (IF_0006) -----
# ASIS NiceCertifySvcImpl.checkNiceAccount() 와 동일 구조.
# 미설정(LOCAL) 시 Mock 성공 반환. 운영 시 NICE 발급값으로 설정.
nice.ext.url=${NICE_EXT_URL:}
nice.uid=${NICE_UID:}
nice.svc.pwd=${NICE_SVC_PWD:}

# M포탈 (mcp-portal-was) URL — 안심보험 가입신청 저장 시 호출
# 운영: http://mcp-portal-was-host:port
mcp.portal.url=${MCP_PORTAL_URL:http://localhost:8080}

# M포탈 서비스해지 적재 전용 URL (미설정 시 mcp.portal.url 기반 또는 LOCAL Mock)
# 운영: http://mcp-portal-was-host:port (mcp.portal.url과 동일 호스트인 경우 비워도 됨)
# mcp.cancel.register.url=${MCP_CANCEL_REGISTER_URL:}

# getParamMap 용 userId (MCP 세션 대신 설정값)
# mplatform.user-id=

# ----- 서식지 SCAN 서버 연동 (IF_0035 SCAN 전송) -----
# ASIS: scan.url, scan.app.path (CustRequestScanServiceImpl)
# 미설정 시 LOCAL Mock 동작 (MOCK_NC_xxx 형태 scanId 반환).
# scan.url=http://scan-server-host:port/upload
scan.app.path=${SCAN_APP_PATH:/tmp/msf-scan/}

# 연동 로그용 (선택, MCP saveMplateSvcLog 에서 사용하는 ip, url, mdlInd)
# mplatform.log.ip=
# mplatform.log.url=
# mplatform.log.mdlInd=
