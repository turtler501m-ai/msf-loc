config:
  credentials_id: MSC-BATCH-PRD
#  retry_with_prompt: true
#  retry_and_return: true
#  retry_count: 3

remote_groups:
  r_group_1:
    - name: jboss
      host: MCP-BATCH1-PRD
  r_group_2:
    - name: jboss
      host: MCP-BATCH2-PRD
command_groups:
  c_group_1:
    - puts:
        - from: '/home/jenkins/data/release/prd/msc-batch/msc-batch.war'
          into: '/home/jboss/domains/msc-batch/deployments/'
          override: true
        - from: '/home/jenkins/data/release/prd/msc-batch/ctrl.sh'
          into: '/home/jboss/domains/msc-batch/'
          override: true
    - commands:
        - 'chmod 755 /home/jboss/domains/msc-batch/deployments/msc-batch.war'
        - 'ls -lrt /home/jboss/domains/msc-batch/deployments/msc-batch.war'
        - 'chmod 755 /home/jboss/domains/msc-batch/ctrl.sh'
        - 'ls -lrt /home/jboss/domains/msc-batch/ctrl.sh'
        - 'cd /home/jboss/domains/msc-batch; bash ctrl.sh restart'
  c_group_2:
    - puts:
        - from: '/home/jenkins/data/release/prd/msc-batch/msc-batch.war'
          into: '/home/jboss/domains/msc-batch/deployments/'
          override: true
        - from: '/home/jenkins/data/release/prd/msc-batch/ctrl.sh'
          into: '/home/jboss/domains/msc-batch/'
          override: true
    - commands:
        - 'chmod 755 /home/jboss/domains/msc-batch/deployments/msc-batch.war'
        - 'ls -lrt /home/jboss/domains/msc-batch/deployments/msc-batch.war'
        - 'chmod 755 /home/jboss/domains/msc-batch/ctrl.sh'
        - 'ls -lrt /home/jboss/domains/msc-batch/ctrl.sh'
        - 'cd /home/jboss/domains/msc-batch; bash ctrl.sh start'
        - 'cd /home/jboss/domains/msc-batch; bash ctrl.sh stop'

steps:
  deploy1:
    - remote_groups:
        - r_group_1
      command_groups:
        - c_group_1
  deploy2:
    - remote_groups:
        - r_group_2
      command_groups:
        - c_group_2
