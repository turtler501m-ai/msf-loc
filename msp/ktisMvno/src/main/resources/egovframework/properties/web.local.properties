# [Admin Environment ] - Static rule
# ################################################################
mvno.config.configfile=
mvno.config.runtype=0

# [DataBase Environment ] - DataBase Postgres Plus Advanced Server
# ----------------------------------------------------------------
mvno.oracle.jdbc.driver=oracle.jdbc.driver.OracleDriver
mvno.oracle.jdbc.maxActive=100
mvno.oracle.jdbc.initialSize=4
# --- \uac1c\ubc1c\uacc4\uc815 ---

# method - (DB Update\ub97c direct\ub85c \uc218\ud589\ud560 \uc9c0, Spool\uc744 \ud1b5\ud574 \uc218\ud589\ud560 \uc9c0 \uc124\uc815)
# interval - (DB Update\uac00 Spool \uc720\ud615\uc77c \uacbd\uc6b0 \uc8fc\uae30\uc801\uc73c\ub85c \uac80\uc0ac\ud558\ub294 \uc2dc\uac04 \ub2e8\uc704(\ucd08)
mvno.oracle.update.method=spool
mvno.oracle.update.interval=10

# [Log/Policy/Result File ] - 
# logs folder   = [mvno.path.log] + "/logs"
# stats folder  = [mvno.path.log] + "/stats"
# policy folder = [mvno.path.policy] + "web.policy.properties"
# ----------------------------------------------------------------
mvno.path.log=/temp//jb_log/MVNOI/
mvno.path.policy=/jboss/applications/MVNO/POLICY/
